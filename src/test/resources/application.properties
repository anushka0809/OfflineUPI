spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configurations for test
offlineupi.app.jwtExpirationMs=86400000
offlineupi.app.jwtRefreshExpirationMs=86400000

# Security Keys
offlineupi.app.jwtSecret=9a4f2c8d3b7a1e5c8f9d0a2b4c6e8f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e
offlineupi.app.aesSecret=OfflineUPIAESKey

# Caching for tests (Simple in-memory ConcurrentHashMap cache to avoid Redis dependency in tests)
spring.cache.type=simple
