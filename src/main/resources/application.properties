# Server
server.port=8080
server.error.whitelabel.enabled=false
server.error.include-message=always

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# MySQL (overridden by Docker environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/offlineupi?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

# H2 console disabled — production uses MySQL
spring.h2.console.enabled=false

# JWT (access token 24h, refresh token 7 days)
offlineupi.app.jwtExpirationMs=86400000
offlineupi.app.jwtRefreshExpirationMs=604800000
offlineupi.app.jwtSecret=${OFFLINEUPI_APP_JWTSECRET:9a4f2c8d3b7a1e5c8f9d0a2b4c6e8f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e}
offlineupi.app.aesSecret=${OFFLINEUPI_APP_AESSECRET:OfflineUPIAESKey}

# Redis cache
spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
